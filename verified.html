<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Email Verified | BuildPro UK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary-blue: #0047AB;
  --dark-blue: #003380;
  --white: #FFFFFF;
  --off-white: #F8FAFB;
  --text-dark: #1A2332;
  --text-gray: #5A6C7D;
  --border-gray: #E1E8ED;
  --success-green: #00C853;
}
body {
  font-family: 'DM Sans', sans-serif;
  background: linear-gradient(135deg, var(--off-white) 0%, var(--white) 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; }

header { background: var(--white); box-shadow: 0 2px 10px rgba(0,71,171,0.08); }
nav { max-width: 1400px; margin: 0 auto; padding: 0.75rem 1.25rem; display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 1.5rem; font-weight: 700; color: var(--primary-blue); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }

.main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1.25rem; }

.card {
  background: var(--white);
  border-radius: 20px;
  box-shadow: 0 8px 40px rgba(0,71,171,0.12);
  padding: 3.5rem 2.5rem;
  max-width: 500px;
  width: 100%;
  text-align: center;
  animation: slideUp 0.5s ease-out;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}

.icon-circle {
  width: 100px;
  height: 100px;
  background: linear-gradient(135deg, var(--success-green), #00E676);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3rem;
  margin: 0 auto 2rem;
  animation: pop 0.4s ease-out 0.3s both;
  box-shadow: 0 8px 25px rgba(0,200,83,0.35);
}
@keyframes pop {
  from { transform: scale(0.5); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

.card h1 {
  font-size: 2rem;
  color: var(--success-green);
  margin-bottom: 1rem;
}

.card p {
  color: var(--text-gray);
  font-size: 1.05rem;
  line-height: 1.7;
  margin-bottom: 2rem;
}

.countdown {
  font-size: 0.95rem;
  color: var(--text-gray);
  margin-bottom: 2rem;
}
.countdown span {
  color: var(--primary-blue);
  font-weight: 700;
  font-size: 1.1rem;
}

.login-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--primary-blue);
  color: var(--white);
  padding: 1rem 2.5rem;
  border-radius: 8px;
  text-decoration: none;
  font-weight: 700;
  font-size: 1.05rem;
  transition: all 0.3s ease;
  min-height: 52px;
  width: 100%;
  border: none;
  cursor: pointer;
}
.login-btn:hover { background: var(--dark-blue); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,71,171,0.3); }

.divider { margin: 1.5rem 0; border: none; border-top: 2px solid var(--border-gray); }

.home-link {
  color: var(--text-gray);
  text-decoration: none;
  font-size: 0.95rem;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
}
.home-link:hover { color: var(--primary-blue); }

/* Error state */
.card.error .icon-circle { background: linear-gradient(135deg, #D32F2F, #F44336); box-shadow: 0 8px 25px rgba(211,47,47,0.35); }
.card.error h1 { color: #D32F2F; }

footer { background: var(--dark-blue); color: var(--white); padding: 1.5rem 1.25rem; text-align: center; }
footer p { font-size: 0.9rem; opacity: 0.8; }
footer a { color: var(--white); text-decoration: none; }

@media (max-width: 640px) {
  .card { padding: 2.5rem 1.5rem; }
  .card h1 { font-size: 1.75rem; }
}
</style>
</head>
<body>

<header>
  <nav>
    <a href="index.html" class="logo"><span>🏗️</span><span>BuildPro UK</span></a>
  </nav>
</header>

<main class="main">
  <div class="card" id="card">
    <div class="icon-circle" id="icon">✓</div>
    <h1 id="title">Email Verified!</h1>
    <p id="message">Your account has been successfully verified. You can now log in with your username and password.</p>
    <div class="countdown" id="countdown">Redirecting to login in <span id="timer">5</span> seconds...</div>
    <a href="loginpage.html" class="login-btn" id="loginBtn">Go to Login Now</a>
    <hr class="divider">
    <a href="index.html" class="home-link">← Back to Home</a>
  </div>
</main>

<footer>
  <p>&copy; 2026 BuildPro UK. All rights reserved. | <a href="#">Privacy Policy</a> | <a href="#">Terms & Conditions</a></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL  = 'YOUR_SUPABASE_URL';
  const SUPABASE_ANON = 'YOUR_SUPABASE_ANON_KEY';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  // Check if there's an error in the URL
  const params = new URLSearchParams(window.location.hash.replace('#', '?'));
  const error  = params.get('error');

  if (error) {
    // Show error state
    const card = document.getElementById('card');
    card.classList.add('error');
    document.getElementById('icon').textContent = '✕';
    document.getElementById('title').textContent = 'Link Expired';
    document.getElementById('message').textContent = 'This verification link has expired or is invalid. Please sign up again or request a new verification email.';
    document.getElementById('countdown').style.display = 'none';
    document.getElementById('loginBtn').textContent = 'Back to Login';
    document.getElementById('loginBtn').href = 'loginpage.html';
  } else {
    // Success — auto countdown to login
    let seconds = 5;
    const timerEl = document.getElementById('timer');
    const interval = setInterval(() => {
      seconds--;
      timerEl.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(interval);
        window.location.href = 'loginpage.html';
      }
    }, 1000);
  }
</script>
</body>
</html>
